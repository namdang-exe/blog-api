spring.application.name=blog-api

# ─── H2 In-Memory Database ────────────────────────────────────────────────────
# The JDBC URL uses "mem:blogdb" — a named in-memory database.
# Named (not anonymous) so the H2 console and the app share the same instance.
spring.datasource.url=jdbc:h2:mem:blogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# create-drop: Hibernate creates tables on startup, drops them on shutdown.
# Perfect for development — each restart gives you a clean slate.
# WARNING: never use create-drop or create in production.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─── H2 Console ───────────────────────────────────────────────────────────────
# Lets you browse the in-memory database at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080
